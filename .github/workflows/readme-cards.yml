name: Update README cards

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Generate stats card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: stats
          options: username=${{ github.repository_owner }}&show_icons=true&theme=catppuccin_mocha&include_all_commits=true&count_private=true
          path: profile/stats.svg
          token: ${{ secrets.PAT }}

      - name: Generate top languages card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: top-langs
          options: username=${{ github.repository_owner }}&layout=compact&langs_count=8&card_width=320&theme=catppuccin_mocha
          path: profile/top-langs.svg
          token: ${{ secrets.PAT }}

      - name: Generate pin card (stash-mcp)
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: pin
          options: username=${{ github.repository_owner }}&repo=stash-mcp&theme=catppuccin_mocha
          path: profile/pin-stash-mcp.svg
          token: ${{ secrets.PAT }}

      - name: Generate pin card (mcp-server-factory)
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: pin
          options: username=${{ github.repository_owner }}&repo=mcp-server-factory&theme=catppuccin_mocha
          path: profile/pin-mcp-server-factory.svg
          token: ${{ secrets.PAT }}

      - name: Generate pin card (Bitbucket.Net)
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: pin
          options: username=${{ github.repository_owner }}&repo=Bitbucket.Net&theme=catppuccin_mocha
          path: profile/pin-bitbucket-net.svg
          token: ${{ secrets.PAT }}

      - name: Commit cards
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add profile/*.svg
          git commit -m "chore: update README cards" || exit 0
          git push
